name: Build electronapp

on:
  push:
    branches:
      - electron
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build Windows desktop apps
        run: |
          npm run desktop:package:win
          npm run desktop:package:win:installer
        env:
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
          CSC_LINK: ${{ secrets.WINDOWS_CODESIGN_CERTIFICATE }}

      - name: Upload portable app
        uses: actions/upload-artifact@v6
        with:
          if-no-files-found: error
          name: pdf-annotator-windows-portable
          path: release/*portable.exe

      - name: Upload installer
        uses: actions/upload-artifact@v6
        with:
          if-no-files-found: error
          name: pdf-annotator-windows-installer
          path: release/*setup.exe
