name: Build Desktop App

on:
  push:
    branches:
      - main
      - electron

permissions:
  contents: read

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Debug checkout
        run: |
          git branch --show-current
          git rev-parse HEAD
          git log -1 --oneline
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build portable Windows app
        run: npm run desktop:package:win
        env:
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
          CSC_LINK: ${{ secrets.WINDOWS_CODESIGN_CERTIFICATE }}

      - name: Build Windows installer
        run: npm run desktop:package:win:installer
        env:
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
          CSC_LINK: ${{ secrets.WINDOWS_CODESIGN_CERTIFICATE }}

      - name: Upload portable app
        uses: actions/upload-artifact@v6
        with:
          if-no-files-found: error
          name: pdf-annotator-windows-portable
          path: release/*portable.exe

      - name: Upload installer
        uses: actions/upload-artifact@v6
        with:
          if-no-files-found: error
          name: pdf-annotator-windows-installer
          path: release/*setup.exe
