name: Build Desktop App

on:
  push:
    branches:
      - main
      - electron
  workflow_dispatch:
    inputs:
      package:
        description: Desktop package to build
        options:
          - portable
          - installer
          - both
        required: true
        type: choice
        default: portable

env:
  PACKAGE: ${{ github.event_name == 'push' && 'both' || inputs.package }}
  
permissions:
  contents: read

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build portable Windows app
        if: ${{ inputs.package == 'portable' || inputs.package == 'both' }}
        run: npm run desktop:package:win
        env:
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
          CSC_LINK: ${{ secrets.WINDOWS_CODESIGN_CERTIFICATE }}

      - name: Build Windows installer
        if: ${{ inputs.package == 'installer' || inputs.package == 'both' }}
        run: npm run desktop:package:win:installer
        env:
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
          CSC_LINK: ${{ secrets.WINDOWS_CODESIGN_CERTIFICATE }}

      - name: Upload portable app
        if: ${{ inputs.package == 'portable' || inputs.package == 'both' }}
        uses: actions/upload-artifact@v6
        with:
          if-no-files-found: error
          name: pdf-annotator-windows-portable
          path: release/*portable.exe

      - name: Upload installer
        if: ${{ inputs.package == 'installer' || inputs.package == 'both' }}
        uses: actions/upload-artifact@v6
        with:
          if-no-files-found: error
          name: pdf-annotator-windows-installer
          path: release/*setup.exe
