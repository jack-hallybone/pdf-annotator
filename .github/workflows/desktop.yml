name: Build Desktop App

on:
  push:
    branches:
      - main
      - electron
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-portable:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build portable Windows app
        run: npm run desktop:package:win
        env:
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
          CSC_LINK: ${{ secrets.WINDOWS_CODESIGN_CERTIFICATE }}

      - name: Upload portable app
        uses: actions/upload-artifact@v6
        with:
          if-no-files-found: error
          name: pdf-annotator-windows-portable
          path: release/*.exe
